# =============================================================================
# Entity Resolution — Model Pipeline Configuration
# Used by: train.py, evaluate.py, bias_detection.py, sensitivity_analysis.py,
#          build_graph.py, write_clusters.py, score_network.py
# =============================================================================

# -----------------------------------------------------------------------------
# Model
# -----------------------------------------------------------------------------
model:
  base_model: "microsoft/deberta-v3-base"
  num_labels: 2
  max_length: 256
  cache_dir: "./cache"

# -----------------------------------------------------------------------------
# LoRA
# -----------------------------------------------------------------------------
lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.1
  target_modules:
    - "query_proj"
    - "value_proj"
  bias: "none"
  task_type: "SEQ_CLS"
  modules_to_save:
    - "classifier"
    - "pooler"

# -----------------------------------------------------------------------------
# Training  (used by train.py)
# -----------------------------------------------------------------------------
training:
  batch_size: 32
  learning_rate: 2.0e-5
  num_epochs: 3
  warmup_steps: 500
  weight_decay: 0.01
  gradient_accumulation_steps: 2

  # Optimizer
  optimizer: "adamw"
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  # LR scheduler
  lr_scheduler_type: "linear"

  # Checkpointing & evaluation
  evaluation_strategy: "epoch"
  save_strategy: "epoch"
  load_best_model_at_end: true
  metric_for_best_model: "f1"
  greater_is_better: true
  save_total_limit: 3
  save_steps: 500

  # Logging
  logging_dir: "./logs"
  logging_steps: 100
  logging_first_step: false

# -----------------------------------------------------------------------------
# Data  (used by both train.py and evaluate.py)
# -----------------------------------------------------------------------------
data:
  gcs_bucket: "entity-resolution-bucket-1"
  gcs_path: "training"
  local_data_dir: "./data"

  # Entity types to train/evaluate — comment out types not yet ready
  entity_types:
    - "person"
    # - "product"
    # - "publication"

  # Split names (must match GCS filenames)
  train_split: "train"
  val_split: "val"
  test_split: "test"

  # Column names in CSV
  columns:
    id1: "id1"
    id2: "id2"
    name1: "name1"
    name2: "name2"
    address1: "address1"
    address2: "address2"
    label: "label"
    entity_type: "entity_type"
    source_dataset: "source_dataset"
#    dob1: "dob1"
#    dob2: "dob2"

# -----------------------------------------------------------------------------
# Output paths  (used by both train.py and evaluate.py)
# Placeholders: {base_dir}, {entity_type}, {model_dir}
# -----------------------------------------------------------------------------
output:
  base_dir: "./models"
  model_dir: "{base_dir}/{entity_type}"
  final_model_dir: "{model_dir}/final_model"
  checkpoint_dir: "{model_dir}/checkpoints"
  results_dir: "{model_dir}/results"
  plots_dir: "{model_dir}/plots"

# -----------------------------------------------------------------------------
# MLflow  (used by both train.py and evaluate.py)
# Override tracking_uri at runtime via MLFLOW_TRACKING_URI env var if needed
# -----------------------------------------------------------------------------
mlflow:
  tracking_uri: "http://mlflow:5000"
  experiment_name: "entity-resolution-deberta"
  run_name_prefix: "deberta_lora"
  artifact_path: "model"
  registered_model_name: "er_{entity_type}_deberta"

  tags:
    project: "entity-resolution"
    pipeline_version: "1.0"
    model_type: "deberta-v3-base"
    method: "lora-fine-tuning"

# -----------------------------------------------------------------------------
# Validation  (used by train.py quality gate + evaluate.py quality gate)
# -----------------------------------------------------------------------------
validation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"
    - "auc"

  # Threshold used by evaluate.py inference loop to convert probs → labels
  classification_threshold: 0.45

  # Quality gate thresholds — pipeline goes NO-GO if any are breached
  min_f1: 0.75
  min_precision: 0.70
  min_recall: 0.70
  min_auc: 0.80

# -----------------------------------------------------------------------------
# Bias detection  (used by bias_detection.py)
# -----------------------------------------------------------------------------
bias_detection:
  enabled: true
  slices:
    - "source_dataset"
    - "entity_type"
  max_f1_disparity: 0.15
  max_precision_disparity: 0.15
  max_recall_disparity: 0.15
  min_slice_size: 100

# -----------------------------------------------------------------------------
# Sensitivity analysis  (used by sensitivity_analysis.py)
# -----------------------------------------------------------------------------
sensitivity:
  enabled: true
  methods:
    - "shap"
    - "feature_importance"
  shap_samples: 100

# -----------------------------------------------------------------------------
# Device
# -----------------------------------------------------------------------------
device:
  use_cuda: true
  cuda_device: 0
  fp16: false              # Set true for A100/V100 to speed up training
  fp16_opt_level: "O1"

# -----------------------------------------------------------------------------
# Reproducibility
# -----------------------------------------------------------------------------
seed: 42

# -----------------------------------------------------------------------------
# GCP
# -----------------------------------------------------------------------------
gcp:
  project_id: "entity-resolution-487121"
  region: "us-central1"
  artifact_registry:
    enabled: true
    repository: "ml-models"
    location: "us-central1"
    image_name: "er_{entity_type}_deberta"   # formatted at runtime
    serving_base_image: "pytorch/pytorch:2.1.0-cuda11.8-cudnn8-runtime"  # must match trainer Dockerfile
    serving_packages:
      - "google-cloud-storage>=2.0.0"
      - "transformers==4.36.2"
      - "peft==0.7.1"
      - "accelerate==0.25.0"
      - "sentencepiece==0.1.99"   
      - "pyyaml>=6.0"             
      - "pandas"                  
    tmp_build_dir: "/tmp/er_push"

# -----------------------------------------------------------------------------
# Notifications
# -----------------------------------------------------------------------------
notifications:
  enabled: false
  slack_webhook_url: null
  email_recipients: []

# -----------------------------------------------------------------------------
# Graph — clustering thresholds
# -----------------------------------------------------------------------------
graph:
  deberta_keep_threshold: 0.30
  cluster_edge_threshold: 0.45
  graph_prefix: "graph"
  process_csv_bucket: "entity-resolution-bucket-1"
  experiment_name: "entity-resolution-clusters"

# -----------------------------------------------------------------------------
# BigQuery — output tables for clusters
# -----------------------------------------------------------------------------
bigquery:
  dataset: "entity_resolution"
  clusters_table: "entity_clusters"
  edges_table: "cluster_edges"
  network_scores_table: "network_scores"
  location: "US"

network_scoring:
  experiment_name: "entity-resolution-network"
  weights:
    cluster_risk:   0.30
    bad_neighbour:  0.40
    shared_field:   0.20
    centrality:     0.10
  high_risk_threshold:   0.70
  medium_risk_threshold: 0.40

# -----------------------------------------------------------------------------
# Inference pipeline — Vertex AI scheduling params
# Customise these without touching Python code.
# -----------------------------------------------------------------------------
inference_pipeline:
  pipeline_name: "er-inference-pipeline"
  pipeline_yaml_gcs: "gs://entity-resolution-bucket-1/pipelines/inference_pipeline.yaml"

  # Airflow DAG schedule (cron) — used by airflow_inference_dag.py
  schedule_cron: "0 2 * * *"       # 2 AM UTC daily

  # Machine types
  build_graph_machine: "n1-standard-8"   # high memory for embedding extraction
  gnn_machine: "n1-standard-8"           # T4 GPU attached separately in pipeline
  write_clusters_machine: "n1-standard-4"

  # Entity types to run — can differ from training entity_types
  entity_types:
    - "person"

  # Records source for each entity type (GCS paths)
  # These are the NEW records to resolve daily — not the training set.
  # Override per entity type for multi-entity pipelines.
  records_gcs_paths:
    person: "gs://entity-resolution-bucket-1/inference/person/records.csv"

# -----------------------------------------------------------------------------
# Field rules — consumed by build_graph.py enrich_edge()
# Controls edge feature computation, weights, and veto logic.
# Tier 1 (live): weight, veto_on_mismatch changes take effect next pipeline run
# Tier 3 (retrain): adding a field to DeBERTa text pair requires retrain
# -----------------------------------------------------------------------------
field_rules:
  - field: dob
    scorer: date_exact        # normalises separators, binary match
    weight: 1.5               # higher weight — hard identity signal
    veto_on_mismatch: true    # DOB present on both + mismatch → veto edge
    has_flag: true

  - field: email
    scorer: email             # domain-aware: exact=1.0, same user diff domain=0.6
    weight: 1.0
    veto_on_mismatch: false   # email mismatch alone is not definitive
    has_flag: true

  - field: phone
    scorer: phone             # normalised digit suffix comparison
    weight: 1.0
    veto_on_mismatch: false
    has_flag: true

  - field: company
    scorer: jaro_winkler      # normalised text fuzzy match
    weight: 0.8
    veto_on_mismatch: false
    has_flag: true