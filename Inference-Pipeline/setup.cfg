[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v

[flake8]
max-line-length = 130
ignore = E203,W503,E226,E402,E221,E241,E251,E272,W504,E501,F401,F841
exclude =
    .git,
    __pycache__,
    .env,
    .venv,
    venv,
    build,
    dist,
    static/
per-file-ignores =
    dags/*.py: E402

[isort]
profile = black
line_length = 100
known_first_party = scripts
