[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    --cov=scripts
    --cov-report=term-missing
    --cov-fail-under=80
    -v

[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    .env,
    venv,
    static/
ignore = E203, W503

[isort]
profile = black
line_length = 100
known_first_party = scripts
