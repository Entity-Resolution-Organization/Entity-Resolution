# PIPELINE DEFINITION
# Name: er-monitoring-pipeline
# Description: Daily model monitoring: evaluate, detect drift, trigger retrain if needed
# Inputs:
#    gcs_bucket: str [Default: 'entity-resolution-bucket-1']
#    mlflow_tracking_uri: str [Default: '']
#    project_id: str [Default: 'entity-resolution-487121']
#    region: str [Default: 'us-central1']
components:
  comp-alert-op:
    executorLabel: exec-alert-op
    inputDefinitions:
      parameters:
        decision:
          parameterType: STRING
        reason:
          parameterType: STRING
  comp-alert-op-2:
    executorLabel: exec-alert-op-2
    inputDefinitions:
      parameters:
        decision:
          parameterType: STRING
        reason:
          parameterType: STRING
  comp-condition-1:
    dag:
      tasks:
        alert-op:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-alert-op
          dependentTasks:
          - trigger-retrain-op
          inputs:
            parameters:
              decision:
                runtimeValue:
                  constant: RETRAIN
              reason:
                runtimeValue:
                  constant: Model decay or data drift detected. Retraining triggered.
          taskInfo:
            name: alert_retrain
        trigger-retrain-op:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-trigger-retrain-op
          inputs:
            parameters:
              gcs_bucket:
                componentInputParameter: pipelinechannel--gcs_bucket
              mlflow_tracking_uri:
                componentInputParameter: pipelinechannel--mlflow_tracking_uri
              project_id:
                componentInputParameter: pipelinechannel--project_id
              region:
                componentInputParameter: pipelinechannel--region
          taskInfo:
            name: trigger_retraining
    inputDefinitions:
      parameters:
        pipelinechannel--gcs_bucket:
          parameterType: STRING
        pipelinechannel--mlflow_tracking_uri:
          parameterType: STRING
        pipelinechannel--monitor-op-Output:
          parameterType: STRING
        pipelinechannel--project_id:
          parameterType: STRING
        pipelinechannel--region:
          parameterType: STRING
  comp-condition-2:
    dag:
      tasks:
        alert-op-2:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-alert-op-2
          inputs:
            parameters:
              decision:
                runtimeValue:
                  constant: HEALTHY
              reason:
                runtimeValue:
                  constant: All metrics within thresholds. No action needed.
          taskInfo:
            name: alert_healthy
    inputDefinitions:
      parameters:
        pipelinechannel--monitor-op-Output:
          parameterType: STRING
  comp-monitor-op:
    executorLabel: exec-monitor-op
    inputDefinitions:
      parameters:
        gcs_bucket:
          parameterType: STRING
        project_id:
          parameterType: STRING
        region:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-trigger-retrain-op:
    executorLabel: exec-trigger-retrain-op
    inputDefinitions:
      parameters:
        gcs_bucket:
          parameterType: STRING
        mlflow_tracking_uri:
          parameterType: STRING
        project_id:
          parameterType: STRING
        region:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
defaultPipelineRoot: gs://entity-resolution-bucket-1/pipeline-root
deploymentSpec:
  executors:
    exec-alert-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - alert_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef alert_op(reason: str, decision: str) -> None:\n    \"\"\"Send\
          \ notification about monitoring result.\"\"\"\n    import json\n    import\
          \ urllib.request\n\n    import yaml\n\n    with open(\"/app/config/training_config.yaml\"\
          ) as f:\n        config = yaml.safe_load(f)\n\n    msg = (\n        f\"\
          [ER Monitoring] Decision: {decision}\\n\"\n        f\"Reason: {reason}\\\
          n\"\n        f\"Vertex AI: https://console.cloud.google.com/vertex-ai/pipelines\"\
          \n        f\"?project={config['gcp']['project_id']}\"\n    )\n    print(msg)\n\
          \n    notif = config.get(\"notifications\", {})\n    if notif.get(\"enabled\"\
          ) and notif.get(\"slack_webhook_url\"):\n        payload = json.dumps({\"\
          text\": msg}).encode()\n        req = urllib.request.Request(\n        \
          \    notif[\"slack_webhook_url\"],\n            data=payload,\n        \
          \    headers={\"Content-Type\": \"application/json\"},\n        )\n    \
          \    urllib.request.urlopen(req)\n        print(\"[alert_op] Slack notification\
          \ sent\")\n\n"
        image: us-central1-docker.pkg.dev/entity-resolution-487121/ml-models/er-trainer:latest
    exec-alert-op-2:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - alert_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef alert_op(reason: str, decision: str) -> None:\n    \"\"\"Send\
          \ notification about monitoring result.\"\"\"\n    import json\n    import\
          \ urllib.request\n\n    import yaml\n\n    with open(\"/app/config/training_config.yaml\"\
          ) as f:\n        config = yaml.safe_load(f)\n\n    msg = (\n        f\"\
          [ER Monitoring] Decision: {decision}\\n\"\n        f\"Reason: {reason}\\\
          n\"\n        f\"Vertex AI: https://console.cloud.google.com/vertex-ai/pipelines\"\
          \n        f\"?project={config['gcp']['project_id']}\"\n    )\n    print(msg)\n\
          \n    notif = config.get(\"notifications\", {})\n    if notif.get(\"enabled\"\
          ) and notif.get(\"slack_webhook_url\"):\n        payload = json.dumps({\"\
          text\": msg}).encode()\n        req = urllib.request.Request(\n        \
          \    notif[\"slack_webhook_url\"],\n            data=payload,\n        \
          \    headers={\"Content-Type\": \"application/json\"},\n        )\n    \
          \    urllib.request.urlopen(req)\n        print(\"[alert_op] Slack notification\
          \ sent\")\n\n"
        image: us-central1-docker.pkg.dev/entity-resolution-487121/ml-models/er-trainer:latest
    exec-monitor-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - monitor_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef monitor_op(\n    gcs_bucket: str,\n    project_id: str,\n   \
          \ region: str,\n) -> str:\n    \"\"\"\n    Runs full monitoring: evaluate\
          \ holdout, detect drift, check thresholds,\n    log to BigQuery. Returns\
          \ 'HEALTHY' or 'RETRAIN'.\n    \"\"\"\n    import json\n    import os\n\
          \    import subprocess\n    import sys\n\n    # Install monitoring dependencies\n\
          \    subprocess.check_call([\n        sys.executable, \"-m\", \"pip\", \"\
          install\",\n        \"evidently>=0.5.0\", \"scipy\", \"requests\",\n   \
          \     \"--quiet\", \"--no-warn-script-location\"\n    ])\n\n    os.environ[\"\
          CONFIG_PATH\"] = \"/app/config/training_config.yaml\"\n\n    from scripts.monitor\
          \ import ModelMonitor, load_config\n\n    config = load_config(os.environ[\"\
          CONFIG_PATH\"])\n\n    results = {}\n    for entity_type in config[\"data\"\
          ][\"entity_types\"]:\n        monitor = ModelMonitor(config=config, entity_type=entity_type)\n\
          \        result = monitor.run()\n        results[entity_type] = result\n\
          \n    # Return overall decision\n    for et, r in results.items():\n   \
          \     decision = r.get(\"thresholds\", {}).get(\"decision\", \"ERROR\")\n\
          \        if decision == \"RETRAIN\":\n            return \"RETRAIN\"\n\n\
          \    return \"HEALTHY\"\n\n"
        image: us-central1-docker.pkg.dev/entity-resolution-487121/ml-models/er-trainer:latest
        resources:
          cpuLimit: 4.0
          memoryLimit: 16.0
    exec-trigger-retrain-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - trigger_retrain_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef trigger_retrain_op(\n    gcs_bucket: str,\n    project_id: str,\n\
          \    region: str,\n    mlflow_tracking_uri: str,\n) -> str:\n    \"\"\"\
          Triggers the model training pipeline.\"\"\"\n    import os\n\n    from google.cloud\
          \ import aiplatform, storage\n\n    aiplatform.init(\n        project=project_id,\n\
          \        location=region,\n        staging_bucket=f\"gs://{gcs_bucket.replace('gs://',\
          \ '')}\",\n    )\n\n    # Read pipeline YAML from GCS\n    pipeline_yaml_gcs\
          \ = f\"gs://{gcs_bucket}/pipelines/pipeline.yaml\"\n    local_yaml = \"\
          /tmp/pipeline.yaml\"\n\n    client = storage.Client()\n    client.bucket(gcs_bucket).blob(\"\
          pipelines/pipeline.yaml\").download_to_filename(\n        local_yaml\n \
          \   )\n\n    job = aiplatform.PipelineJob(\n        display_name=f\"er-retrain-triggered-by-monitoring-{os.environ.get('PIPELINE_RUN_ID',\
          \ 'manual')}\",\n        template_path=local_yaml,\n        pipeline_root=f\"\
          gs://{gcs_bucket}/pipeline-root\",\n        parameter_values={\n       \
          \     \"mlflow_tracking_uri\": mlflow_tracking_uri,\n            \"gcs_bucket\"\
          : gcs_bucket,\n            \"rollback_threshold\": 0.02,\n            \"\
          deploy_machine_type\": \"n1-standard-4\",\n            \"min_replicas\"\
          : 1,\n            \"max_replicas\": 1,\n        },\n        enable_caching=False,\n\
          \    )\n\n    job.run(sync=False)\n    print(f\"[trigger_retrain_op] Retraining\
          \ pipeline submitted\")\n    return \"submitted\"\n\n"
        image: us-central1-docker.pkg.dev/entity-resolution-487121/ml-models/er-trainer:latest
pipelineInfo:
  description: 'Daily model monitoring: evaluate, detect drift, trigger retrain if
    needed'
  name: er-monitoring-pipeline
root:
  dag:
    tasks:
      condition-1:
        componentRef:
          name: comp-condition-1
        dependentTasks:
        - monitor-op
        inputs:
          parameters:
            pipelinechannel--gcs_bucket:
              componentInputParameter: gcs_bucket
            pipelinechannel--mlflow_tracking_uri:
              componentInputParameter: mlflow_tracking_uri
            pipelinechannel--monitor-op-Output:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: monitor-op
            pipelinechannel--project_id:
              componentInputParameter: project_id
            pipelinechannel--region:
              componentInputParameter: region
        taskInfo:
          name: if-retrain
        triggerPolicy:
          condition: inputs.parameter_values['pipelinechannel--monitor-op-Output']
            == 'RETRAIN'
      condition-2:
        componentRef:
          name: comp-condition-2
        dependentTasks:
        - monitor-op
        inputs:
          parameters:
            pipelinechannel--monitor-op-Output:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: monitor-op
        taskInfo:
          name: if-healthy
        triggerPolicy:
          condition: inputs.parameter_values['pipelinechannel--monitor-op-Output']
            == 'HEALTHY'
      monitor-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-monitor-op
        inputs:
          parameters:
            gcs_bucket:
              componentInputParameter: gcs_bucket
            project_id:
              componentInputParameter: project_id
            region:
              componentInputParameter: region
        taskInfo:
          name: monitor_model
  inputDefinitions:
    parameters:
      gcs_bucket:
        defaultValue: entity-resolution-bucket-1
        isOptional: true
        parameterType: STRING
      mlflow_tracking_uri:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      project_id:
        defaultValue: entity-resolution-487121
        isOptional: true
        parameterType: STRING
      region:
        defaultValue: us-central1
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.7.0
