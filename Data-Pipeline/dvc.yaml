# =============================================================================
# DVC Pipeline - Entity Resolution Data Pipeline
# =============================================================================
# Run full pipeline: dvc repro
# Run single stage: dvc repro <stage_name>
# Check status: dvc status
# =============================================================================

stages:
  # ---------------------------------------------------------------------------
  # Stage 1: Generate/Download Raw Data
  # ---------------------------------------------------------------------------
  generate_data:
    cmd: python scripts/generate_test_data.py --dataset pseudopeople --output-dir data
    deps:
      - scripts/generate_test_data.py
      - scripts/dataset_factory.py
      - config/datasets.yaml
    outs:
      - data/raw/pseudopeople.csv:
          cache: true
    metrics:
      - data/metrics/generation_stats.json:
          cache: false
    desc: "Generate synthetic entity data for testing"

  # ---------------------------------------------------------------------------
  # Stage 2: Preprocess Data (Normalize, Corrupt, Generate Pairs)
  # ---------------------------------------------------------------------------
  preprocess_data:
    cmd: python scripts/generate_test_data.py --dataset pseudopeople --output-dir data
    deps:
      - data/raw/pseudopeople.csv
      - scripts/preprocessing.py
      - scripts/generate_test_data.py
    outs:
      - data/processed/pseudopeople_accounts.csv:
          cache: true
      - data/processed/pseudopeople_pairs.csv:
          cache: true
    desc: "Normalize entities and generate training pairs"

  # ---------------------------------------------------------------------------
