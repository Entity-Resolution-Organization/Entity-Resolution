# =============================================================================
# Entity Resolution Dataset Configuration
# PERSON datasets for deBERTa + LoRA adapter training
# =============================================================================

# Active datasets to process (DAG reads this list)
active_datasets:
  - "pseudopeople"
  - "nc_voters"
  - "ofac_sdn"

datasets:
  pseudopeople:
    name: "Pseudopeople Synthetic Population"
    entity_type: "PERSON"
    source_url: "https://github.com/ihmeuw/pseudopeople"
    base_records: 15000
    target_records: 150000
    corruption:
      rate: 0.25
    pairs:
      positive: 40000
      negative: 40000

  nc_voters:
    name: "NC Voters Registry"
    entity_type: "PERSON"
    source_url: "https://dbs.uni-leipzig.de/research/projects/object_matching/"
    base_records: 15000
    target_records: 150000
    corruption:
      rate: 0.25
    pairs:
      positive: 40000
      negative: 40000

  ofac_sdn:
    name: "OFAC Sanctions List"
    entity_type: "PERSON"
    source_url: "https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN.CSV"
    base_records: 2000
    target_records: 150000
    corruption:
      rate: 0.30
    pairs:
      positive: 40000
      negative: 40000
