# =============================================================================
# Multi-Domain Entity Resolution Dataset Configuration
# =============================================================================
# PRODUCTION CONFIG: 50K records per dataset for model training
# Supports 6 datasets across 3 entity types for LoRA adapter training
# =============================================================================

# Active datasets to process (array for multi-domain support)
active_datasets:
  - "pseudopeople"   # PERSON
  - "nc_voters"      # PERSON
  - "ofac_sdn"       # PERSON
  - "wdc_products"   # PRODUCT
  - "amazon_2018"    # PRODUCT
  - "dblp_acm"       # PUBLICATION

# Legacy single dataset support (for backward compatibility)
active_dataset: "pseudopeople"

datasets:
  # ========== PERSON DATASETS (3 sources) ==========
  pseudopeople:
    name: "Pseudopeople Synthetic Population"
    entity_type: "PERSON"
    source_url: "https://github.com/ihmeuw/pseudopeople"
    base_records: 5000
    target_records: 50000
    schema:
      - name
      - address
      - dob
      - ssn
    corruption:
      rate: 0.15
      name_variants: true
      address_typos: true
      date_formats: true
    pairs:
      total: 10000
      positive: 5000
      negative: 5000
    bigquery_tables:
      accounts: "laundrograph.accounts"
      pairs: "laundrograph.er_pairs"

  nc_voters:
    name: "NC Voters Registry"
    entity_type: "PERSON"
    source_url: "https://dbs.uni-leipzig.de/research/projects/object_matching/"
    base_records: 5000
    target_records: 50000
    schema:
      - full_name
      - street_address
      - city
      - state
      - zip
      - birth_year
    corruption:
      rate: 0.12
      name_variants: true
      address_typos: true
      date_formats: false
    pairs:
      total: 10000
      positive: 5000
      negative: 5000
    bigquery_tables:
      accounts: "laundrograph.accounts"
      pairs: "laundrograph.er_pairs"

  ofac_sdn:
    name: "OFAC Sanctions List"
    entity_type: "PERSON"
    # Treasury direct download URL (stable endpoint)
    source_url: "https://www.treasury.gov/ofac/downloads/sdn.csv"
    base_records: 5000
    target_records: 50000
    expansion_factor: 3
    schema:
      - name
      - address
      - nationality
      - aliases
    corruption:
      rate: 0.20
      name_variants: true
      address_typos: true
      date_formats: false
    pairs:
      total: 10000
      positive: 5000
      negative: 5000
    bigquery_tables:
      accounts: "laundrograph.accounts"
      pairs: "laundrograph.er_pairs"

  # ========== PRODUCT DATASETS (2 sources) ==========
  wdc_products:
    name: "WDC Products Benchmark"
    entity_type: "PRODUCT"
    source_url: "https://webdatacommons.org/largescaleproductcorpus/"
    base_records: 5000
    target_records: 50000
    schema:
      - title
      - brand
      - price
      - description
      - category
    corruption:
      rate: 0.20
      title_variants: true
      price_noise: true
      brand_omission: true
    pairs:
      total: 10000
      positive: 5000
      negative: 5000
    bigquery_tables:
      products: "cataloggraph.products"
      pairs: "cataloggraph.er_pairs"
    graph:
      type: "co_purchase"
      edges: 50000

  amazon_2018:
    name: "Amazon Co-Purchase Network"
    entity_type: "PRODUCT"
    source_url: "http://jmcauley.ucsd.edu/data/amazon/"
    base_records: 5000
    target_records: 50000
    schema:
      - asin
      - title
      - brand
      - price
      - also_bought
    corruption:
      rate: 0.18
      title_variants: true
      price_noise: true
      brand_omission: true
    pairs:
      total: 10000
      positive: 5000
      negative: 5000
    bigquery_tables:
      products: "cataloggraph.products"
      pairs: "cataloggraph.er_pairs"
      copurchase_edges: "cataloggraph.copurchase_graph"
    graph:
      type: "co_purchase"
      edges: 50000

  # ========== PUBLICATION DATASETS (1 source) ==========
  dblp_acm:
    name: "DBLP-ACM Author Disambiguation"
    entity_type: "PUBLICATION"
    source_url: "https://dbs.uni-leipzig.de/research/projects/object_matching/"
    base_records: 5000
    target_records: 50000
    schema:
      - title
      - authors
      - venue
      - year
    corruption:
      rate: 0.05
      author_variants: true
      venue_abbreviations: true
    pairs:
      total: 10000
      positive: 5000
      negative: 5000
    bigquery_tables:
      papers: "scholargraph.papers"
      authors: "scholargraph.authors"
      pairs: "scholargraph.er_pairs"
    graph:
      type: "coauthorship"
      edges: 25000

# =============================================================================
# PRODUCTION OUTPUT:
#   - ~300K total accounts (50K × 6 datasets)
#   - ~60K total pairs (10K × 6 datasets)
#   - 3 entity types: PERSON, PRODUCT, PUBLICATION
#   - Pipeline execution: ~30-60 minutes
# =============================================================================
