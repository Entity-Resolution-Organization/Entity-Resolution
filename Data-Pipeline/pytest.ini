[pytest]
# Pytest configuration for Entity Resolution Data Pipeline
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbose output
addopts = -v --tb=short

# Coverage configuration
[coverage:run]
source = scripts
branch = True
omit =
    scripts/__pycache__/*
    scripts/utils.py

[coverage:report]
# Minimum coverage percentage required
fail_under = 80
show_missing = True
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass

[coverage:html]
directory = htmlcov
