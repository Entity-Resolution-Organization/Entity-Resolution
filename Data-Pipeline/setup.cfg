[coverage:run]
source = scripts
branch = True
omit =
    scripts/__pycache__/*
    scripts/utils.py
    scripts/generate_test_data.py
    */__init__.py

[coverage:report]
fail_under = 65
show_missing = True
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
    except ImportError

[coverage:html]
directory = htmlcov
title = Entity Resolution Pipeline Coverage Report
