[flake8]
max-line-length = 120
ignore = E501,W503,E203,E226,E402
exclude = .git,__pycache__,.venv,venv,build,dist
per-file-ignores =
    dags/*.py: E402
    scripts/generate_test_data.py: E402

[coverage:run]
source = scripts
branch = True
omit =
    scripts/__pycache__/*
    scripts/utils.py
    scripts/generate_test_data.py
    */__init__.py

[coverage:report]
fail_under = 65
show_missing = True
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
    except ImportError

[coverage:html]
directory = htmlcov
title = Entity Resolution Pipeline Coverage Report
