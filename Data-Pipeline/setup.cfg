[flake8]
max-line-length = 130
ignore = E203,W503,E226,E402,E221,E241,E251,E272,W504,E501
exclude =
    .git,
    __pycache__,
    .env,
    .venv,
    venv,
    build,
    dist,
    static/
per-file-ignores =
    dags/*.py: E402

[coverage:run]
source = scripts
branch = True
omit =
    scripts/__pycache__/*
    */__init__.py

[coverage:report]
fail_under = 80
show_missing = True
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
    except ImportError

[coverage:html]
directory = htmlcov
title = Entity Resolution Pipeline Coverage Report

[isort]
profile = black