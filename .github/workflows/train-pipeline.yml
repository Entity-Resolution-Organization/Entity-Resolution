name: Model Pipeline CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - "Model-Pipeline/**"
      - ".github/workflows/train-pipeline.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "Model-Pipeline/**"
      - ".github/workflows/train-pipeline.yml"
  workflow_dispatch:
    inputs:
      skip_training:
        description: "Skip Vertex AI training (run evaluate + push only)"
        required: false
        default: "false"

env:
  PROJECT_ID: entity-resolution-487121
  REGION:     us-central1
  IMAGE:      us-central1-docker.pkg.dev/entity-resolution-487121/ml-models/er-trainer

# =============================================================================
# Job 1 — Lint
# =============================================================================
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Model-Pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "Model-Pipeline/requirements.txt"

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Check formatting with black
        run: |
          black --check --diff scripts/ || echo "::warning::Run 'black scripts/' to fix formatting"

      - name: Check import sorting with isort
        run: |
          isort --check-only --diff scripts/ || echo "::warning::Run 'isort scripts/' to fix imports"

      - name: Lint with flake8 — errors only
        run: |
          flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint with flake8 — warnings
        run: |
          flake8 scripts/ --count --exit-zero --max-line-length=120 --max-complexity=15 --statistics

# =============================================================================
# Job 2 — Validate config
# =============================================================================
  validate-config:
    name: Validate config
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Model-Pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate training_config.yaml
        run: |
          python -c "
          import yaml

          with open('config/training_config.yaml') as f:
              config = yaml.safe_load(f)

          required_sections = ['model', 'lora', 'training', 'data', 'output',
                               'mlflow', 'validation', 'bias_detection',
                               'sensitivity', 'device', 'gcp']
          for section in required_sections:
              assert section in config, f'Missing section: {section}'

          assert config['data']['gcs_bucket'], 'gcs_bucket is empty'
          assert config['data']['entity_types'], 'entity_types is empty'
          assert config['gcp']['project_id'], 'project_id is empty'
          assert config['gcp']['artifact_registry']['repository'], 'repository is empty'

          print('✓ training_config.yaml is valid')
          print(f'  Entity types : {config[\"data\"][\"entity_types\"]}')
          print(f'  Base model   : {config[\"model\"][\"base_model\"]}')
          print(f'  GCS bucket   : {config[\"data\"][\"gcs_bucket\"]}')
          "

# =============================================================================
# Job 3 — Tests
# =============================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint, validate-config]

    defaults:
      run:
        working-directory: Model-Pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "Model-Pipeline/requirements.txt"

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov pyyaml numpy pandas scikit-learn

      - name: Run tests
        run: |
          if [ -d "tests" ] && [ "$(ls -A tests/*.py 2>/dev/null)" ]; then
            pytest tests/ \
              --cov=scripts \
              --cov-report=term-missing \
              --cov-report=xml \
              -v \
              --ignore=tests/test_integration.py
          else
            echo "No tests found yet — skipping"
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: Model-Pipeline/coverage.xml
          flags: model-pipeline
          name: model-pipeline-coverage
          fail_ci_if_error: false

# =============================================================================
# Job 4 — Build and push Docker image
# =============================================================================
  build:
    name: Build and push trainer image
    runs-on: ubuntu-latest
    needs: [lint, validate-config]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    defaults:
      run:
        working-directory: Model-Pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          echo "tag=${{ env.IMAGE }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image tag: ${{ env.IMAGE }}:${SHORT_SHA}"

      - name: Build
        run: |
          docker build \
            -t ${{ steps.tag.outputs.tag }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push
        run: |
          docker push ${{ steps.tag.outputs.tag }}
          docker push ${{ env.IMAGE }}:latest

# =============================================================================
# Job 5 — Submit Vertex AI training job
# =============================================================================
  train:
    name: Train on Vertex AI
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.skip_training != 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit and wait for Vertex AI job
        run: |
          JOB_NAME="er-train-${GITHUB_SHA::8}-$(date +%Y%m%d%H%M%S)"

          # Submit job and capture job ID
          JOB_ID=$(gcloud ai custom-jobs create \
            --region=${{ env.REGION }} \
            --display-name="${JOB_NAME}" \
            --worker-pool-spec=\
          machine-type=n1-standard-8,\
          accelerator-type=NVIDIA_TESLA_T4,\
          accelerator-count=1,\
          container-image-uri=${{ needs.build.outputs.image_tag }} \
            --project=${{ env.PROJECT_ID }} \
            --env-vars="CONFIG_PATH=config/training_config.yaml,\
          MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" \
            --format="get(name)")

          echo "Submitted job: ${JOB_NAME}"
          echo "Job ID: ${JOB_ID}"

          # Stream logs and wait for completion
          gcloud ai custom-jobs stream-logs ${JOB_ID} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

          # Check final state
          STATE=$(gcloud ai custom-jobs describe ${JOB_ID} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format="get(state)")

          echo "Final state: ${STATE}"

          if [[ "${STATE}" != "JOB_STATE_SUCCEEDED" ]]; then
            echo "Vertex AI job failed with state: ${STATE}"
            exit 1
          fi

          echo "JOB_ID=${JOB_ID}" >> $GITHUB_ENV

# =============================================================================
# Job 6 — Evaluate, bias detection, push to registry
# =============================================================================
  evaluate-and-push:
    name: Evaluate and push
    runs-on: ubuntu-latest
    needs: train

    defaults:
      run:
        working-directory: Model-Pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "Model-Pipeline/requirements.txt"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install dependencies
        run: |
          pip install \
            mlflow==2.11.0 \
            pyyaml==6.0.1 \
            google-cloud-storage==2.16.0 \
            scikit-learn==1.4.0 \
            pandas==2.2.0 \
            numpy==1.26.4 \
            matplotlib==3.8.3 \
            seaborn==0.13.2

      - name: Download model weights from GCS
        run: |
          python -c "
          import yaml, os
          from google.cloud import storage

          with open('config/training_config.yaml') as f:
              config = yaml.safe_load(f)

          bucket_name = config['data']['gcs_bucket']
          base_dir    = config['output']['base_dir']
          client      = storage.Client()
          bucket      = client.bucket(bucket_name)

          for entity_type in config['data']['entity_types']:
              gcs_prefix = f'models/{entity_type}/final_model'
              local_dir  = f'{base_dir}/{entity_type}/final_model'
              os.makedirs(local_dir, exist_ok=True)

              blobs = client.list_blobs(bucket_name, prefix=gcs_prefix)
              for blob in blobs:
                  rel_path   = blob.name[len(gcs_prefix):].lstrip('/')
                  local_path = os.path.join(local_dir, rel_path)
                  os.makedirs(os.path.dirname(local_path), exist_ok=True)
                  blob.download_to_filename(local_path)
                  print(f'Downloaded: {blob.name} → {local_path}')

              print(f'Model weights ready at {local_dir}')
          "
        env:
          CONFIG_PATH: config/training_config.yaml

      - name: Run evaluate
        env:
          CONFIG_PATH: config/training_config.yaml
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python scripts/evaluate.py

      - name: Run bias detection
        env:
          CONFIG_PATH: config/training_config.yaml
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python scripts/bias_detection.py

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Push to Artifact Registry
        env:
          CONFIG_PATH: config/training_config.yaml
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python scripts/push_to_registry.py

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-results-${{ github.sha }}
          path: |
            Model-Pipeline/models/*/results/test_metrics.json
            Model-Pipeline/models/*/results/bias_report.json
            Model-Pipeline/models/*/plots/
          retention-days: 30