name: Model Pipeline CI

on:
  push:
    branches: [main, dev]
    paths:
      - "Model-Pipeline/**"
      - ".github/workflows/train-pipeline.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "Model-Pipeline/**"
      - ".github/workflows/train-pipeline.yml"
  workflow_dispatch: {}

env:
  PROJECT_ID: entity-resolution-487121
  REGION:     us-central1
  IMAGE:      us-central1-docker.pkg.dev/entity-resolution-487121/ml-models/er-trainer

# =============================================================================
# Job 1 — Lint
# =============================================================================
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Model-Pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "Model-Pipeline/requirements.txt"

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Check formatting with black
        run: black --check --diff scripts/ || echo "::warning::Run 'black scripts/' to fix formatting"

      - name: Check import sorting with isort
        run: isort --check-only --diff scripts/ || echo "::warning::Run 'isort scripts/' to fix imports"

      - name: Lint with flake8 — errors only
        run: flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint with flake8 — warnings
        run: flake8 scripts/ --count --exit-zero --max-line-length=120 --max-complexity=15 --statistics

# =============================================================================
# Job 2 — Validate config
# =============================================================================
  validate-config:
    name: Validate config
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Model-Pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate training_config.yaml
        run: |
          python -c "
          import yaml

          with open('config/training_config.yaml') as f:
              config = yaml.safe_load(f)
          required = ['model', 'lora', 'training', 'data', 'output',
                      'mlflow', 'validation', 'bias_detection',
                      'sensitivity', 'device', 'gcp']
          for s in required:
              assert s in config, f'Missing section: {s}'
          assert config['data']['gcs_bucket'], 'gcs_bucket is empty'
          assert config['data']['entity_types'], 'entity_types is empty'
          assert config['gcp']['project_id'], 'project_id is empty'
          print('✓ training_config.yaml is valid')
          print(f'  Entity types : {config[\"data\"][\"entity_types\"]}')
          print(f'  Base model   : {config[\"model\"][\"base_model\"]}')
          print(f'  GCS bucket   : {config[\"data\"][\"gcs_bucket\"]}')
          "

# =============================================================================
# Job 3 — Tests
# =============================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint, validate-config]
    defaults:
      run:
        working-directory: Model-Pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "Model-Pipeline/requirements.txt"

      - name: Install test dependencies
        run: pip install pytest pytest-cov pyyaml numpy pandas scikit-learn

      - name: Run tests
        run: |
          if [ -d "tests" ] && [ "$(ls -A tests/*.py 2>/dev/null)" ]; then
            pytest tests/ \
              --cov=scripts \
              --cov-report=term-missing \
              --cov-report=xml \
              -v \
              --ignore=tests/test_integration.py
          else
            echo "No tests found yet — skipping"
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: Model-Pipeline/coverage.xml
          flags: model-pipeline
          name: model-pipeline-coverage
          fail_ci_if_error: false

# =============================================================================
# Job 4 — Build and push Docker image
# =============================================================================
  build:
    name: Build and push trainer image
    runs-on: ubuntu-latest
    needs: [lint, validate-config, test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    defaults:
      run:
        working-directory: Model-Pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          echo "tag=${{ env.IMAGE }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image: ${{ env.IMAGE }}:${SHORT_SHA}"

      - name: Build
        run: |
          docker build \
            -t ${{ steps.tag.outputs.tag }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push
        run: |
          docker push ${{ steps.tag.outputs.tag }}
          docker push ${{ env.IMAGE }}:latest

# =============================================================================
# Job 5 — Compile and upload KFP pipeline
# Runs after Docker push so pipeline.yaml always references the latest image.
# Airflow RunPipelineJobOperator reads pipeline.yaml from GCS to trigger runs.
# =============================================================================
  compile-pipeline:
    name: Compile and upload pipeline
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: Model-Pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install KFP and GCP SDK
        run: pip install kfp==2.7.0 google-cloud-aiplatform google-cloud-storage

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Compile pipeline
        run: python pipeline.py --compile --output pipeline.yaml

      - name: Upload pipeline.yaml to GCS
        run: |
          gcloud storage cp pipeline.yaml \
            gs://entity-resolution-bucket-1/pipelines/pipeline.yaml
          echo "Uploaded → gs://entity-resolution-bucket-1/pipelines/pipeline.yaml"