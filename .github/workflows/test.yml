name: Data Pipeline CI

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "Data-Pipeline/**"
      - "requirements-dev.txt"
      - ".github/workflows/test.yml"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "Data-Pipeline/**"
      - "requirements-dev.txt"
      - ".github/workflows/test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Data-Pipeline
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            Data-Pipeline/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r ../requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-config=setup.cfg \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: Data-Pipeline/coverage.xml
          flags: data-pipeline
          name: data-pipeline-coverage
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Data-Pipeline
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements-dev.txt

      - name: Check code formatting with Black
        run: black --check --diff scripts/ tests/ dags/

      - name: Check import sorting with isort
        run: isort --check-only --diff scripts/ tests/ dags/

      - name: Lint with flake8
        run: |
          flake8 scripts/ tests/ dags/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 scripts/ tests/ dags/ --count --exit-zero --max-complexity=15 --statistics

  validate-config:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Data-Pipeline
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate datasets.yaml
        run: |
          python -c "
          import yaml
          with open('config/datasets.yaml') as f:
              config = yaml.safe_load(f)
          assert 'active_datasets' in config, 'Missing active_datasets'
          assert 'datasets' in config, 'Missing datasets'
          required_fields = ['name', 'entity_type', 'base_records', 'target_records']
          for dataset_name in config['active_datasets']:
              assert dataset_name in config['datasets'], f'Dataset {dataset_name} not defined'
              dataset = config['datasets'][dataset_name]
              for field in required_fields:
                  assert field in dataset, f'Dataset {dataset_name} missing {field}'
          print('datasets.yaml is valid')
          print(f'  Active datasets: {len(config[\"active_datasets\"])}')
          "
