# ============================================================
#  GitHub Actions CI/CD — Inference Pipeline
#  Entity Resolution — Group 13, Northeastern MLOps Spring 2026
# ============================================================
#
#  Triggers on any push/PR that touches Inference-Pipeline/**
#
#  Jobs:
#    1. lint     — black, isort, flake8
#    2. test     — pytest with coverage (80% minimum)
#    3. build    — Docker image build + push to Artifact Registry
#    4. deploy   — Deploy to Cloud Run (main branch only)
# ============================================================

name: Inference Pipeline CI/CD

on:
  push:
    branches: [main, feature/inference-pipeline]
    paths:
      - "Inference-Pipeline/**"
      - ".github/workflows/inference-pipeline.yml"
  pull_request:
    branches: [main]
    paths:
      - "Inference-Pipeline/**"

env:
  GCP_PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION:       us-central1
  GCP_BUCKET_NAME:  ${{ secrets.GCP_BUCKET_NAME }}
  REGISTRY:         us-central1-docker.pkg.dev
  IMAGE_NAME:       us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/entity-resolution/inference-pipeline
  CLOUD_RUN_SERVICE: entity-resolution-inference

jobs:

  # ================================================================
  # Job 1 — Lint
  # ================================================================
  lint:
    name: Lint (black + isort + flake8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Inference-Pipeline

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install lint dependencies
        run: pip install black isort flake8

      - name: black — auto-format
        run: black --line-length 100 scripts/ dags/

      - name: isort — auto-sort imports
        run: isort --profile black --line-length 100 scripts/ dags/

      - name: flake8 — check style
        run: flake8 scripts/ dags/ --max-line-length 100 --ignore E203,W503

      - name: Commit formatting fixes (if any)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format with black and isort"
          file_pattern: "Inference-Pipeline/**/*.py"


  # ================================================================
  # Job 2 — Test
  # ================================================================
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: Inference-Pipeline

    env:
      USE_MOCK_CLIENT:  "true"
      GCP_PROJECT_ID:   entity-resolution-487121
      GCP_BUCKET_NAME:  entity-resolution-bucket-1
      API_BASE_URL:     http://localhost:8000
      MLFLOW_TRACKING_URI: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            fastapi==0.111.0 \
            uvicorn==0.29.0 \
            pydantic==2.7.1 \
            httpx==0.27.0 \
            pyyaml==6.0.1 \
            python-dotenv==1.0.1 \
            jellyfish==1.0.4 \
            pytest==8.2.0 \
            pytest-asyncio==0.23.7 \
            pytest-cov==5.0.0 \
            requests==2.32.0

      - name: Install GCP stubs
        run: |
          pip install \
            google-auth==2.29.0 \
            google-cloud-storage==2.16.0

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: Inference-Pipeline/coverage.xml


  # ================================================================
  # Job 3 — Build & Push Docker image
  # ================================================================
  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: Inference-Pipeline
          file: Inference-Pipeline/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Docker Image Built ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY


  # ================================================================
  # Job 4 — Deploy to Cloud Run (main branch only)
  # ================================================================
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy inference API to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region:  ${{ env.GCP_REGION }}
          image:   ${{ env.IMAGE_NAME }}:latest
          env_vars: |
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCP_BUCKET_NAME=${{ secrets.GCP_BUCKET_NAME }}
            GCP_REGION=${{ env.GCP_REGION }}
            USE_MOCK_CLIENT=false
            MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}
          flags: |
            --port=8000
            --min-instances=1
            --max-instances=5
            --memory=2Gi
            --cpu=2
            --concurrency=80
            --service-account=${{ secrets.GCP_SA_EMAIL }}

      - name: Verify deployment health
        run: |
          SERVICE_URL="${{ steps.deploy.outputs.url }}"
          echo "Deployed to: $SERVICE_URL"

          # Wait for service to be healthy
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              break
            fi
            echo "Attempt $i: status $STATUS — retrying in 10s..."
            sleep 10
          done

          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed after 10 attempts"
            exit 1
          fi

      - name: Summary
        run: |
          echo "### Deployed to Cloud Run ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** \`${{ env.CLOUD_RUN_SERVICE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.GCP_REGION }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack on success
        if: success()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"✅ *Inference Pipeline Deployed*\n*Service:* \`${{ env.CLOUD_RUN_SERVICE }}\`\n*URL:* ${{ steps.deploy.outputs.url }}\n*Commit:* \`${{ github.sha }}\`\"
            }"

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"❌ *Inference Pipeline Deploy FAILED*\n*Branch:* \`${{ github.ref_name }}\`\n*Commit:* \`${{ github.sha }}\`\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
