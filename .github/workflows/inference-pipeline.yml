name: Inference Pipeline CI/CD

on:
  push:
    branches: [main, feature/inference-pipeline]
    paths:
      - "Inference-Pipeline/**"
      - ".github/workflows/inference-pipeline.yml"
  pull_request:
    branches: [main]
    paths:
      - "Inference-Pipeline/**"

env:
  GCP_PROJECT_ID:    ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION:        us-central1
  GCP_BUCKET_NAME:   ${{ secrets.GCP_BUCKET_NAME }}
  REGISTRY:          us-central1-docker.pkg.dev
  IMAGE_NAME:        us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/entity-resolution/inference-pipeline
  CLOUD_RUN_SERVICE: entity-resolution-inference

jobs:

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Inference-Pipeline
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install flake8
        run: pip install flake8
      - name: flake8 check
        run: flake8 scripts/ dags/ --max-line-length 100 --ignore E203,W503,E402,W291,W293,W292

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: Inference-Pipeline
    env:
      USE_MOCK_CLIENT:     "true"
      GCP_PROJECT_ID:      entity-resolution-487121
      GCP_BUCKET_NAME:     entity-resolution-bucket-1
      API_BASE_URL:        http://localhost:8000
      MLFLOW_TRACKING_URI: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          pip install fastapi==0.111.0 uvicorn==0.29.0 pydantic==2.7.1 httpx==0.27.0 pyyaml==6.0.1 python-dotenv==1.0.1 jellyfish==1.0.4 pytest==8.2.0 pytest-asyncio==0.23.7 pytest-cov==5.0.0 requests==2.32.0 google-auth==2.29.0 google-cloud-storage==2.16.0
      - name: Run tests
        run: pytest tests/ --cov=scripts --cov-report=term-missing --cov-fail-under=35 -v
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: Inference-Pipeline/coverage.xml

  build:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: Inference-Pipeline
          file:    Inference-Pipeline/Dockerfile
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region:  ${{ env.GCP_REGION }}
          image:   ${{ env.IMAGE_NAME }}:latest
          env_vars: |
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCP_BUCKET_NAME=${{ secrets.GCP_BUCKET_NAME }}
            USE_MOCK_CLIENT=false
            MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}
          flags: --port=8000 --min-instances=1 --max-instances=5 --memory=2Gi --cpu=2 --service-account=${{ secrets.GCP_SA_EMAIL }}
      - name: Health check
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}/health")
            if [ "$STATUS" = "200" ]; then echo "Health check passed"; break; fi
            sleep 10
          done