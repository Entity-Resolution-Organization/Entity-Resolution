name: Inference Pipeline CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - "Inference-Pipeline/**"
      - ".github/workflows/inference-pipeline.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "Inference-Pipeline/**"

env:
  GCP_REGION:        us-central1
  CLOUD_RUN_SERVICE: entity-resolution-inference

jobs:

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Inference-Pipeline
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install flake8
        run: pip install flake8
      - name: flake8 check
        run: flake8 scripts/ dags/

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: Inference-Pipeline
    env:
      USE_MOCK_CLIENT:     "true"
      GCP_PROJECT_ID:      entity-resolution-487121
      GCP_BUCKET_NAME:     entity-resolution-bucket-1
      API_BASE_URL:        http://localhost:8000
      MLFLOW_TRACKING_URI: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          pip install fastapi==0.111.0 uvicorn==0.29.0 pydantic==2.7.1 httpx==0.27.0 pyyaml==6.0.1 python-dotenv==1.0.1 jellyfish==1.0.4 pytest==8.2.0 pytest-asyncio==0.23.7 pytest-cov==5.0.0 requests==2.32.0 google-auth==2.29.0 google-cloud-storage==2.16.0
      - name: Run tests
        run: pytest tests/ -v

  build:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        run: |
          IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ml-models/inference-pipeline"
          docker buildx build \
            --file Inference-Pipeline/Dockerfile \
            --tag "${IMAGE}:sha-${{ github.sha }}" \
            --tag "${IMAGE}:latest" \
            --push \
            Inference-Pipeline